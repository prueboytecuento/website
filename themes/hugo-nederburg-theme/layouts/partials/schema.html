{{ if .IsPage }}
<script type="application/ld+json">
    {
        "@context" : "http://schema.org",
        "@type" : "BlogPosting",
        "mainEntityOfPage": {
             "@type": "WebPage",
             "@id": "{{ .Site.BaseURL }}"
        },
        "articleSection" : "{{ .Section }}",
        "name" : "{{ .Title }}",
        "headline" : "{{ .Title }}",
        "description" : "{{ if .Description }}{{ .Description }}{{ else }}{{ .Summary | plainify | truncate 150 }}{{ end }}",
        "inLanguage" : "es",
        "author" : "{{ .Params.author | default .Site.Params.author }}",
        "creator" : "{{ .Params.author | default .Site.Params.author }}",
        "publisher": "{{ .Params.author | default .Site.Params.author }}",
        "accountablePerson" : "{{ .Params.author | default .Site.Params.author }}",
        "copyrightHolder" : "{{ .Params.author | default .Site.Params.author }}",
        "copyrightYear" : "{{ .Date.Format "2006" }}",
        "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
        "dateModified" : "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
        "url" : "{{ .Permalink }}",
        "wordCount" : "{{ .WordCount }}",
        "image" : "{{ with .Params.image }}{{ . | absURL }}{{ end }}",
        "keywords" : [{{ if isset .Params "tags" }}{{ range $i, $tag := .Params.tags }}{{ if $i }}, {{ end }}"{{ $tag }}"{{ end }}, {{ end }}"Blog"]
    }
</script>
{{ end }}
